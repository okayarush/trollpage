<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nice Try</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --gradient-start: #38bdf8;
            --gradient-end: #818cf8;
            --gradient-accent: #f472b6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08), transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(129, 140, 248, 0.08), transparent 35%),
                radial-gradient(circle at 50% 100%, rgba(244, 114, 182, 0.05), transparent 40%);
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            pointer-events: none;
        }

        .container {
            text-align: center;
            padding: 2rem;
            transform: translateY(30px) scale(0.95);
            opacity: 0;
            animation: reveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            perspective: 1000px;
        }

        h1 {
            font-size: clamp(3.5rem, 12vw, 9rem);
            font-weight: 800;
            letter-spacing: -0.05em;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end), var(--gradient-accent));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            animation: gradientMove 5s ease infinite alternate;
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
        }

        /* Glowing effect behind text */
        h1::after {
            content: 'website under development';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end), var(--gradient-accent));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(32px);
            opacity: 0.4;
            z-index: -1;
            animation: pulseGlow 4s ease-in-out infinite alternate, gradientMove 5s ease infinite alternate;
        }

        .subtitle {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: #94a3b8;
            font-weight: 400;
            margin-top: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
            letter-spacing: 0.02em;
        }

        .emoji {
            display: inline-block;
            font-size: clamp(2rem, 4vw, 3rem);
            margin-top: 2rem;
            opacity: 0;
            transform: scale(0.5) rotate(-15deg);
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s forwards;
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        @keyframes pulseGlow {
            from {
                opacity: 0.3;
                filter: blur(20px);
            }
            to {
                opacity: 0.6;
                filter: blur(40px);
            }
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Interactive mouse glow */
        .cursor-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.08) 0%, transparent 60%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            transform: translate(-50%, -50%);
            transition: opacity 0.5s ease;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cursor-glow" id="glow"></div>
    <div class="container" id="container">
        <h1 id="title">website under development</h1>
        <p class="subtitle">Maybe come back later.</p>
        <span class="emoji">🕵️‍♂️</span>
    </div>

    <script>
        const glow = document.getElementById('glow');
        const title = document.getElementById('title');
        
        // Smooth cursor glow tracking
        let mouseX = 0;
        let mouseY = 0;
        let glowX = 0;
        let glowY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // 3D tilt effect for the title based on mouse position
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const deltaX = (mouseX - centerX) / centerX;
            const deltaY = (mouseY - centerY) / centerY;
            
            title.style.transform = `rotateX(${-deltaY * 10}deg) rotateY(${deltaX * 10}deg)`;
        });

        // Animation loop for smooth glow following
        function animate() {
            // Easing for smooth follow effect
            glowX += (mouseX - glowX) * 0.1;
            glowY += (mouseY - glowY) * 0.1;
            
            glow.style.transform = `translate(${glowX - 300}px, ${glowY - 300}px)`;
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
